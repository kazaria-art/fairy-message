<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日の光メッセージ ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --fairy-pink:   #f9c8d8;
  --fairy-yellow: #fef0b0;
  --fairy-mint:   #b8eed8;
  --fairy-lavend: #d8c8f0;
  --fairy-sky:    #b8e0f4;
  --fairy-peach:  #fdd0a8;
  --text-main:    #6a5a7a;
  --text-sub:     #9a88aa;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background:
    radial-gradient(ellipse at 20% 10%, #ffe8f4 0%, transparent 50%),
    radial-gradient(ellipse at 80% 30%, #e0effe 0%, transparent 45%),
    radial-gradient(ellipse at 50% 90%, #e8fce8 0%, transparent 50%),
    #faf6ff;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  color: var(--text-main);
}

.bg-dots {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}
.bg-dots span {
  position: absolute;
  border-radius: 50%;
  opacity: 0.18;
  animation: floatDot linear infinite;
}
@keyframes floatDot {
  0%   { transform: translateY(0) scale(1); opacity: 0.1; }
  50%  { opacity: 0.25; }
  100% { transform: translateY(-100vh) scale(0.6); opacity: 0; }
}

.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  padding: 0 16px 40px;
}
#page-main { display: block; }
#page-result { display: none; }

/* === MAIN PAGE === */
.main-header {
  text-align: center;
  padding: 40px 0 12px;
}
.main-header h1 {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 0.04em;
  line-height: 1.5;
}
.main-header .sub {
  margin-top: 10px;
  font-size: 15px;
  color: var(--text-sub);
  line-height: 1.8;
}
.ribbon-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 6px 0 4px;
}
.ribbon-line {
  flex: 1;
  max-width: 60px;
  height: 1.5px;
  background: linear-gradient(to right, transparent, #e0b8d8);
  border-radius: 2px;
}
.ribbon-line.right {
  background: linear-gradient(to left, transparent, #e0b8d8);
}
.ribbon-text {
  font-size: 11px;
  color: #c0a0c8;
  letter-spacing: 0.1em;
}

/* Cards grid */
.cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  max-width: 480px;
  margin: 24px auto 0;
}
.card {
  background: white;
  border-radius: 24px;
  padding: 0 0 16px;
  cursor: pointer;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s;
  box-shadow: 0 2px 12px rgba(180,140,200,0.12), 0 1px 4px rgba(180,140,200,0.08);
  border: 1.5px solid rgba(255,255,255,0.9);
}
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 22px;
  opacity: 0.35;
  transition: opacity 0.25s;
  z-index: 0;
}
.card-heal::before   { background: radial-gradient(circle at 60% 30%, var(--fairy-pink), transparent 70%); }
.card-fun::before    { background: radial-gradient(circle at 40% 30%, var(--fairy-yellow), transparent 70%); }
.card-go::before     { background: radial-gradient(circle at 60% 30%, var(--fairy-peach), transparent 70%); }
.card-calm::before   { background: radial-gradient(circle at 40% 30%, var(--fairy-lavend), transparent 70%); }
.card-energy::before { background: radial-gradient(circle at 60% 30%, var(--fairy-mint), transparent 70%); }
.card-conf::before   { background: radial-gradient(circle at 40% 30%, var(--fairy-sky), transparent 70%); }
.card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 10px 28px rgba(180,140,200,0.22), 0 4px 10px rgba(180,140,200,0.14);
}
.card:active { transform: scale(0.96); }
.fairy-wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  aspect-ratio: 1 / 1;
  margin: 0 0 10px;
  overflow: hidden;
  border-radius: 22px 22px 0 0;
}
.fairy-wrap img {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
  padding: 10px;
}
.card .label {
  position: relative;
  z-index: 1;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.03em;
  padding: 0 8px;
}

/* === RESULT PAGE === */
#page-result {
  flex-direction: column;
  align-items: center;
  padding-top: 40px;
  text-align: center;
}
.result-scene {
  position: relative;
  width: 260px;
  height: 260px;
  margin: 0 auto;
}
.result-halo {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  animation: pulse-halo 3s ease-in-out infinite;
}
@keyframes pulse-halo {
  0%,100% { transform: scale(1); opacity: 0.5; }
  50%      { transform: scale(1.08); opacity: 0.85; }
}
.result-fairy-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.result-fairy-wrap img {
  width: 200px;
  height: 200px;
  object-fit: contain;
  filter: drop-shadow(0 6px 18px rgba(200,160,240,0.25));
}
.fairy-pop {
  animation: fairy-pop-in 0.7s cubic-bezier(.22,.8,.36,1) forwards,
             fairy-float 4s ease-in-out 0.7s infinite;
}
@keyframes fairy-pop-in {
  0%   { opacity: 0; transform: scale(0.4) translateY(40px); }
  60%  { opacity: 1; transform: scale(1.12) translateY(-8px); }
  80%  { transform: scale(0.96) translateY(2px); }
  100% { transform: scale(1) translateY(0); }
}
@keyframes fairy-float {
  0%,100% { transform: translateY(0) rotate(-1deg); }
  50%      { transform: translateY(-12px) rotate(1deg); }
}

/* Number badge */
.number-badge-wrap { margin: 16px 0 4px; }
.number-label {
  font-size: 12px;
  color: var(--text-sub);
  letter-spacing: 0.12em;
  margin-bottom: 6px;
}
.number-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  font-size: 32px;
  font-weight: 700;
  background: white;
  box-shadow: 0 4px 18px rgba(200,160,240,0.25);
  border: 3px solid rgba(255,255,255,0.9);
  transition: color 0.4s;
}
.number-badge.master {
  font-size: 22px;
}

/* Sparkles */
.sparkles {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 12px 0 16px;
}
.sp {
  width: 10px; height: 10px; border-radius: 50%;
  animation: sparkle-anim 1.4s ease-in-out infinite;
}
.sp:nth-child(2) { animation-delay: 0.2s; }
.sp:nth-child(3) { animation-delay: 0.4s; }
@keyframes sparkle-anim {
  0%,100% { transform: scale(0.6); opacity: 0.3; }
  50%      { transform: scale(1.2); opacity: 1; }
}

/* Keyword tags */
.keyword-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin: 0 auto 16px;
  max-width: 360px;
  padding: 0 16px;
}
.keyword-tag {
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  background: white;
  letter-spacing: 0.05em;
  box-shadow: 0 1px 6px rgba(180,140,200,0.15);
  transition: transform 0.2s;
  animation: tag-pop 0.4s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes tag-pop {
  from { opacity: 0; transform: scale(0.7); }
  to   { opacity: 1; transform: scale(1); }
}

/* Message card */
.message-card {
  background: white;
  border-radius: 28px;
  padding: 30px 24px 20px;
  max-width: 360px;
  width: 92%;
  margin: 0 auto;
  box-shadow: 0 4px 22px rgba(180,140,200,0.14);
  position: relative;
}
.message-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  border-radius: 28px 28px 0 0;
  background: linear-gradient(to right, #f9c8d8, #d8c8f0, #b8e0f4);
  transition: background 0.4s;
}
.deco-quote {
  position: absolute;
  top: 12px; left: 20px;
  font-size: 48px;
  line-height: 1;
  color: #f0e6f6;
  font-family: Georgia, serif;
}
.message-speech {
  position: relative;
  font-size: 16px;
  font-weight: 700;
  line-height: 1.7;
  color: var(--text-main);
  margin-bottom: 16px;
  text-align: left;
}
.message-desc {
  font-size: 14px;
  line-height: 1.8;
  color: var(--text-sub);
  text-align: left;
  border-top: 1.5px dashed #f0e6f6;
  padding-top: 14px;
}



/* Back button */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 28px;
  padding: 14px 32px;
  border: none;
  border-radius: 50px;
  background: white;
  color: var(--text-main);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 3px 14px rgba(180,140,200,0.2);
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
}
.back-btn:hover {
  transform: translateY(-3px) scale(1.04);
  box-shadow: 0 7px 22px rgba(180,140,200,0.28);
}
.back-btn:active { transform: scale(0.95); }

/* Page transition */
.page-enter { animation: page-in 0.55s cubic-bezier(.22,.8,.36,1) forwards; }
.page-leave { animation: page-out 0.35s ease-in forwards; }
@keyframes page-in {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes page-out {
  from { opacity: 1; transform: scale(1); }
  to   { opacity: 0; transform: scale(1.04); }
}

/* Deco leaves */
.deco-leaves {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.deco-leaf { position: absolute; opacity: 0.15; }
</style>
</head>
<body>

<div class="bg-dots" id="bgDots"></div>

<div class="deco-leaves">
  <svg class="deco-leaf" style="top:-20px;left:-20px;width:160px" viewBox="0 0 120 120">
    <ellipse cx="60" cy="60" rx="55" ry="30" fill="#d8f0c8" transform="rotate(-40 60 60)"/>
  </svg>
  <svg class="deco-leaf" style="bottom:-30px;right:-30px;width:180px" viewBox="0 0 120 120">
    <ellipse cx="60" cy="60" rx="52" ry="28" fill="#f8d0e8" transform="rotate(30 60 60)"/>
  </svg>
</div>

<!-- ===== MAIN PAGE ===== -->
<div class="page" id="page-main">
  <div class="main-header">
    <h1>✨ 今日の光メッセージ ✨</h1>
    <div class="ribbon-wrap">
      <div class="ribbon-line"></div>
      <div class="ribbon-text">— 妖精たちからの贈りもの —</div>
      <div class="ribbon-line right"></div>
    </div>
    <p class="sub">今のあなたに近い気持ちを<br>選んでください 🌸</p>
  </div>

  <div class="cards">
    <div class="card card-heal" onclick="draw('heal')">
      <div class="fairy-wrap"><img src="fairy_rose.png" alt="ローズ妖精"></div>
      <div class="label">癒されたい</div>
    </div>
    <div class="card card-fun" onclick="draw('fun')">
      <div class="fairy-wrap"><img src="fairy_star.png" alt="スター妖精"></div>
      <div class="label">ワクワクしたい</div>
    </div>
    <div class="card card-go" onclick="draw('go')">
      <div class="fairy-wrap"><img src="fairy_flame.png" alt="フレイム妖精"></div>
      <div class="label">前に進みたい</div>
    </div>
    <div class="card card-calm" onclick="draw('calm')">
      <div class="fairy-wrap"><img src="fairy_moon.png" alt="ムーン妖精"></div>
      <div class="label">落ち着きたい</div>
    </div>
    <div class="card card-energy" onclick="draw('energy')">
      <div class="fairy-wrap"><img src="fairy_clover.png" alt="クローバー妖精"></div>
      <div class="label">元気がほしい</div>
    </div>
    <div class="card card-conf" onclick="draw('confidence')">
      <div class="fairy-wrap"><img src="fairy_rainbow.png" alt="レインボー妖精"></div>
      <div class="label">自信がほしい</div>
    </div>
  </div>
</div>

<!-- ===== RESULT PAGE ===== -->
<div class="page" id="page-result">
  <div class="result-scene">
    <div class="result-halo" id="resultHalo"></div>
    <div class="result-fairy-wrap" id="resultFairy"></div>
  </div>

  <div class="number-badge-wrap">
    <div class="number-label">✦ 今日の数字 ✦</div>
    <div class="number-badge" id="resultNumber"></div>
  </div>

  <div class="sparkles" id="resultSparkles">
    <div class="sp" style="background:#f9c8d8;"></div>
    <div class="sp" style="background:#d8c8f0;"></div>
    <div class="sp" style="background:#b8e0f4;"></div>
  </div>

  <div class="keyword-tags" id="resultKeywords"></div>

  <div class="message-card" id="messageCard">
    <span class="deco-quote">"</span>
    <div class="message-speech" id="resultSpeech"></div>
    <div class="message-desc" id="resultDesc"></div>

  </div>

  <button class="back-btn" id="backBtn" onclick="goBack()">
    <span>🌸 別の妖精にも聞いてみる</span>
  </button>
</div>

<script>
/*
  数字の意味（PDF準拠）
  1: 陽・先駆者・行動力・決断力・リーダーシップ・バイタリティ
  2: 陰・受容性・調和・共感力・感受性・サポート力
  3: 喜び・ワクワク・無邪気さ・創造性・コミュニケーション・社交性
  4: 安心・安定・継続力・実直さ・信頼・グランディング
  5: 自由・変化・好奇心・多芸多才・柔軟性・発展力
  6: 愛・美・調和とバランス・優しさ・育成力・責任感
  7: 探究心・洞察力・専門性・哲学的・マイペース・精神性
  8: パワフル・実行力・組織力・富と成功・達成力・拡大
  9: 共感力・博愛・包容力・精神性・慈しみ・世界平和

  各妖精のフィルター
  🌷 heal  （癒し）   ：労い・受容・やさしい肯定
  ✨ fun   （ワクワク）：はしゃぐ・軽やか・好奇心
  🔥 go    （前進）   ：燃やす・背中を押す・熱量
  🌙 calm  （月）     ：静かに見守る・深い洞察
  🍀 energy（元気）   ：明るく励ます・元気チャージ
  🌈 conf  （自信）   ：誇りを持たせる・あなたを認める
*/

const numberMeta = {
  1: { keywords: ['先駆者', '行動力', '決断力', 'リーダーシップ', 'バイタリティ'] },
  2: { keywords: ['受容性', '調和', '共感力', '感受性', 'サポート力'] },
  3: { keywords: ['喜び', 'ワクワク', '無邪気さ', '創造性', 'コミュニケーション'] },
  4: { keywords: ['安心', '安定', '継続力', '実直さ', 'グランディング'] },
  5: { keywords: ['自由', '変化', '好奇心', '多芸多才', '発展力'] },
  6: { keywords: ['愛', '美', '調和とバランス', '優しさ', '育成力'] },
  7: { keywords: ['探究心', '洞察力', '専門性', '哲学的', '精神性'] },
  8: { keywords: ['パワフル', '実行力', '組織力', '達成力', '富と成功'] },
  9: { keywords: ['共感力', '博愛主義', '包容力', '慈しみ', '世界平和'] }
};

/* ── 54メッセージ ── fairy × number */
const messages = {

         desc: "ぐいぐい進む自分を「強引かな」と思うことがあるかも。でも大丈夫。あなたの決断力は誰かを助けるためにある。そのままで十分、素晴らしいよ。" },
    2: { speech: "「人に優しくできるのは、\nあなたの心が豊かな証拠🌸」",

    3: { speech: "「その笑顔と明るさが、\n誰かの一日を救ってるよ🌸」",
         desc: "はしゃいだり笑ったりすることを遠慮しなくていい。あなたの無邪気さは、周りの心を解きほぐす本物のヒーリングなんだよ。" },
    4: { speech: "「コツコツ続けてきたこと、\nちゃんと伝わってるよ🌸」",

    5: { speech: "「自由に動けるあなたが、\nとっても眩しいよ🌸」",

/*
  抽選ロジック：1〜9 をグローバルに均等化
  - numberDrawCount[n] = その数字が引かれた累計回数（全妖精横断）
  - どの妖精を押しても 1〜9 の中から最も少ない回数の数字を優先して選ぶ
  - 同点はランダム → 連打でも、ランダム操作でも均等に 1〜9 が出る
*/
const ALL_NUMBERS = [1,2,3,4,5,6,7,8,9];
const numberDrawCount = {};

function pickNumber() {
  const counts = ALL_NUMBERS.map(n => ({ n, c: numberDrawCount[n] || 0 }));
  const min = Math.min(...counts.map(x => x.c));
  const candidates = counts.filter(x => x.c === min).map(x => x.n);
  const chosen = candidates[Math.floor(Math.random() * candidates.length)];
  numberDrawCount[chosen] = (numberDrawCount[chosen] || 0) + 1;
  return chosen;
}

  dots.appendChild(s);
}

function playFairySound(type) {
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if (!AudioContext) return;
  const ctx = new AudioContext();
  const startTime = ctx.currentTime;
  let notes = [], waveType = 'sine', interval = 0.08, sustain = 0.5, maxGain = 0.12;
  switch(type) {
    case 'heal':       notes = [1046.50,1318.51,1567.98,2093.00]; interval=0.15; sustain=0.8; break;
    case 'fun':        notes = [1318.51,1760.00,2349.32,2637.02]; interval=0.06; sustain=0.3; break;
    case 'go':         notes = [783.99,1046.50,1318.51,1567.98];  interval=0.08; sustain=0.6; waveType='triangle'; maxGain=0.08; break;
    case 'calm':       notes = [880.00,1046.50,1318.51];           interval=0.25; sustain=1.2; break;
    case 'energy':     notes = [1046.50,1396.91,1760.00,2093.00]; interval=0.1;  sustain=0.4; break;
    case 'confidence': notes = [1046.50,1174.66,1318.51,1567.98,1760.00]; interval=0.05; sustain=0.6; break;
    default:           notes = [1046.50,1318.51,1567.98,2093.00];
  }
  notes.forEach((freq, index) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = waveType;
    osc.frequency.value = freq;
    const time = startTime + index * interval;
    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(maxGain, time + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.01, time + sustain);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(time);
    osc.stop(time + sustain);
  });
}

function draw(type) {

  const num    = pickNumber();                  // 1〜9 均等抽選
  const meta   = numberMeta[num];               // キーワード
  const msgData = messages[type][num];          // 妖精×数字のメッセージ

  // Number badge（1桁なので master クラス不要）
  const badge = document.getElementById('resultNumber');
  badge.textContent = num;
  badge.style.color = col.num;
  badge.className = 'number-badge';

  // Speech & desc
  document.getElementById('resultSpeech').innerHTML = msgData.speech.replace(/\n/g, '<br>');
  document.getElementById('resultSpeech').style.color = col.num;
  document.getElementById('resultDesc').textContent = msgData.desc;

    const tag = document.createElement('span');

    tag.textContent = kw;
    tag.style.color = col.num;
    tag.style.animationDelay = (i * 0.07) + 's';
    tagsContainer.appendChild(tag);
  });

  // Fairy image
  document.getElementById('resultFairy').innerHTML = '';
  const fairyImg = document.createElement('img');
  fairyImg.src = fairy.img;
  fairyImg.alt = '妖精';
  fairyImg.classList.add('fairy-pop');
  document.getElementById('resultFairy').appendChild(fairyImg);

  document.getElementById('resultHalo').style.background = col.halo;

  const sps = document.querySelectorAll('.sp');
  col.sp.forEach((c, i) => { if (sps[i]) sps[i].style.background = c; });

  main.classList.add('page-leave');
  setTimeout(() => {
    main.style.display = 'none';
    main.classList.remove('page-leave');
    result.style.display = 'flex';
    result.classList.add('page-enter');
    setTimeout(() => result.classList.remove('page-enter'), 600);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 320);
}

function goBack() {
  const main   = document.getElementById('page-main');

    result.style.display = 'none';
    result.classList.remove('page-leave');
    main.style.display = 'block';
    main.classList.add('page-enter');
    setTimeout(() => main.classList.remove('page-enter'), 600);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 320);
}
